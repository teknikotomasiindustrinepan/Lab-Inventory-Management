<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Inventory System</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: sans-serif; background:#f1f5f9;}
.sidebar-link { padding:10px; cursor:pointer; }
.sidebar-link.active { background:#334155; color:white;}
.page { display:none;}
.page.active { display:block;}
.custom-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);}
</style>
</head>

<body>
<div class="flex">
<!-- SIDEBAR -->
<aside class="w-60 bg-slate-900 text-white p-4 flex flex-col justify-between h-screen">

  <div>
    <h2 class="text-lg font-bold mb-4">LabManager</h2>

    <div id="userInfo" class="mb-4 text-sm text-gray-300"></div>

    <div id="menu-dashboard" class="sidebar-link active" onclick="navigate('dashboard')">Dashboard</div>
    <div id="menu-barang" class="sidebar-link" onclick="navigate('barang')">Barang</div>
    <div id="menu-peminjaman" class="sidebar-link" onclick="navigate('peminjaman')">Peminjaman</div>
    <div id="menu-riwayat" class="sidebar-link" onclick="navigate('riwayat')">Riwayat</div>
  </div>

  <!-- LOGOUT DI BAWAH -->
  <button onclick="logout()" class="w-full bg-red-500 p-2 rounded mt-4">
    Logout
  </button>

</aside>

  
<main class="flex-1 p-6">
<h1 id="page-title" class="text-xl mb-4">dashboard</h1>

<!-- DASHBOARD -->
<section id="dashboard" class="page active">
<h2>Total Barang: <span id="stat-total">0</span></h2>
</section>

<!-- BARANG -->
<section id="barang" class="page">
<button id="btnTambah" onclick="toggleModal(true)">+ Tambah</button>
<table class="w-full mt-4">
<tbody id="barangTable"></tbody>
</table>
</section>

<!-- PEMINJAMAN -->
<section id="peminjaman" class="page">
<form id="loanForm">
<input id="loanName" placeholder="Nama"><br>
<select id="loanBarang"></select><br>
<input id="loanQty" type="number"><br>
<button type="submit">Pinjam</button>
</form>
</section>

<!-- RIWAYAT -->
<section id="riwayat" class="page">
<table class="w-full">
<tbody id="riwayatTable"></tbody>
</table>
</section>

<div id="loginPage" class="fixed inset-0 flex items-center justify-center bg-black/50">
  <div class="bg-white p-6 rounded-xl w-80">
    <h2 class="text-lg font-bold mb-4">Login</h2>
    <input id="email" placeholder="Email" class="w-full border p-2 mb-2">
    <input id="password" type="password" placeholder="Password" class="w-full border p-2 mb-4">
    <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded">Login</button>
  </div>
</div>

  
</main>
</div>

<!-- MODAL -->
<div id="modal" class="custom-modal">
<div class="bg-white p-4">
<input id="nama" placeholder="Nama"><br>
<input id="stok" type="number" placeholder="Stok"><br>
<button onclick="saveBarang()">Simpan</button>
<button onclick="toggleModal(false)">Batal</button>
</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyD7v9RjzDP80LcrblAwe6DGNs_ujQ0NIkk",
authDomain: "lab-inventory-management-c59c8.firebaseapp.com",
projectId: "lab-inventory-management-c59c8"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let barangList = [];
let currentUser = null;
let currentRole = null;

// ================= AUTH =================
function login(){
  let email = document.getElementById('email').value.trim();
  let password = document.getElementById('password').value;

  if(!email || !password){
    alert("Email dan password wajib diisi");
    return;
  }

 auth.signInWithEmailAndPassword(email, password)
  .then(() => {
    console.log("Login success");
  })
  .catch(err => {
    console.error("LOGIN ERROR:", err);
    alert(err.message);
  });
}

auth.onAuthStateChanged(async user=>{
  if(user){
    currentUser = user;

    if(user.email === "teknikotomasiindustri.nepan@gmail.com"){
      currentRole = "admin";
    }else{
      currentRole = "user";
    }

    document.getElementById('loginPage').style.display="none";

    // PINDAHKAN KE SINI
    document.getElementById("userInfo").innerText =
      currentUser.email + " (" + currentRole + ")";

    applyRoleUI();
    initApp();

  }else{
    currentUser = null;
    currentRole = null;

    document.getElementById('loginPage').style.display="flex";
    document.getElementById("userInfo").innerText = "";
  }
});
  //returnedByName   // input manual (siapa yang beneran ngembaliin)
  //returnedByUser   // user login (siapa yang klik sistem)
  
// ================= ROLE =================
function isAdmin(){
return currentRole === "admin";
}

// ================= NAVIGASI =================
window.navigate = function(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  document.getElementById('page-title').innerText = page;

  // TAMBAHAN
  document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('active'));
  document.getElementById("menu-" + page).classList.add('active');
}

// ================= MODAL =================
function toggleModal(show){
if(!isAdmin()){
alert("Hanya admin");
return;
}

const modal = document.getElementById('modal');

if(show){
modal.style.display = "flex";
modal.classList.add("items-center","justify-center");
}else{
modal.style.display = "none";
modal.classList.remove("items-center","justify-center");
}
}

  // ================= FUNCTION KONTROL ROLE =================
function applyRoleUI(){

  if(currentRole === "admin"){
    // tampil semua
    document.getElementById("menu-dashboard").style.display = "block";
    document.getElementById("menu-barang").style.display = "block";
    document.getElementById("menu-peminjaman").style.display = "block";
    document.getElementById("menu-riwayat").style.display = "block";

  }else{
    // user biasa
    document.getElementById("menu-dashboard").style.display = "none";
    document.getElementById("menu-barang").style.display = "none";
    document.getElementById("menu-peminjaman").style.display = "block";
    document.getElementById("menu-riwayat").style.display = "block";

    // default langsung ke peminjaman
    navigate("peminjaman");
  }
}

  
// ================= INIT =================
function initApp(){

// sembunyikan tombol tambah khusus admin
const btnTambah = document.getElementById("btnTambah");

if(!isAdmin()){
  if(btnTambah) btnTambah.style.display="none";
}

// realtime barang
db.collection("barang").onSnapshot(snap=>{
barangList=[];
snap.forEach(doc=>{
barangList.push({id:doc.id,...doc.data()});
});
renderBarang();
document.getElementById('stat-total').innerText=barangList.length;
});

// realtime loan
db.collection("loan")
  .orderBy("time","desc")
  .onSnapshot(snap=>{
    let data=[];
    snap.forEach(doc=>{
      data.push({id:doc.id,...doc.data()});
    });
    renderRiwayat(data);
});
}

// ================= BARANG =================
function saveBarang(){

if(!isAdmin()){
alert("Akses ditolak");
return;
}

let nama = document.getElementById('nama').value.trim();
let stok = parseInt(document.getElementById('stok').value);

if(!nama || isNaN(stok) || stok < 0){
alert("Input tidak valid");
return;
}

db.collection("barang").add({
nama,
stok,
createdAt: new Date()
});

toggleModal(false);
}

// render barang
function renderBarang(){
let html="";
barangList.forEach(b=>{
html+=`<tr>
<td>${b.nama}</td>
<td>${b.stok}</td>
</tr>`;
});
document.getElementById('barangTable').innerHTML=html;

// dropdown
let opt="";
barangList.forEach(b=>{
if(b.stok > 0){
opt+=`<option value="${b.id}">${b.nama} (stok: ${b.stok})</option>`;
}
});
document.getElementById('loanBarang').innerHTML=opt;
}

// ================= PEMINJAMAN =================
document.getElementById('loanForm').addEventListener('submit',async e=>{
e.preventDefault();

let id = document.getElementById('loanBarang').value;
let qty = parseInt(document.getElementById('loanQty').value);
let nama = document.getElementById('loanName').value.trim();

if(!nama || isNaN(qty) || qty <= 0){
alert("Input tidak valid");
return;
}

let ref = db.collection("barang").doc(id);

await db.runTransaction(async (t)=>{
let doc = await t.get(ref);

if(!doc.exists) throw "Barang tidak ada";

let data = doc.data();

if(data.stok < qty){
throw "Stok tidak cukup";
}

// update stok aman
t.update(ref,{
stok: data.stok - qty
});

// simpan loan
let loanRef = db.collection("loan").doc();
t.set(loanRef,{
nama,
barang: data.nama,
barangId: id,
qty,
status:"dipinjam",
time:new Date(),
userId: currentUser.uid
});

}).then(()=>{
alert("Berhasil pinjam");
  
  // reset form
document.getElementById('loanForm').reset();
  
}).catch(err=>{
alert(err);
});

});

// ================= RIWAYAT =================
function renderRiwayat(data){
  let html="";
  
  data.forEach(l=>{
    html+=`<tr>
<td>${l.nama}</td>
<td>${l.barang}</td>
<td>${l.qty}</td>

<td>
  ${l.status}
  <br><small>
    pinjam: ${formatDate(l.time)} <br>
    kembali: ${formatDate(l.returnedAt)}
  </small>

  ${l.status === "kembali" 
    ? `<br><small>
        oleh: ${l.returnedByName || '-'} <br>
        user: ${l.returnedByUser || '-'}
      </small>`
    : ''}
</td>

<td>
${(l.status=="dipinjam" && currentUser && (isAdmin() || l.userId === currentUser.uid)) 
  ? `<button onclick="kembali('${l.id}','${l.barangId}',${l.qty})">Kembali</button>` 
  : ''}
</td>
</tr>`;
  });

  document.getElementById('riwayatTable').innerHTML=html;
}

// ================= PENGEMBALIAN =================
async function kembali(id, barangId, qty){

let ref = db.collection("barang").doc(barangId);

await db.runTransaction(async (t)=>{
let doc = await t.get(ref);

if(!doc.exists) throw "Barang tidak ada";

let data = doc.data();

// tambah stok
t.update(ref,{
stok: data.stok + qty
});

// update status
t.update(db.collection("loan").doc(id),{
  status: "kembali",
  returnedByName: currentUser.email,
  returnedByUser: currentUser.email,
  returnedAt: new Date()
});

}).then(()=>{
alert("Dikembalikan");
}).catch(err=>{
alert(err);
});
}
  
// ================= format waktu =================
  function formatDate(date){
  if(!date) return "-";

  let d = date.toDate ? date.toDate() : new Date(date);

  return d.toLocaleString("id-ID");
}
  
// ================= LOGOUT =================
function logout(){
  auth.signOut()
    .then(()=>{
      console.log("Logout berhasil");

      // reset UI tambahan
      document.getElementById("barangTable").innerHTML="";
      document.getElementById("riwayatTable").innerHTML="";
    })
    .catch(err=>{
      alert(err.message);
    });
}
  
</script>

</body>
</html>
