<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Inventory System</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: sans-serif; background:#f1f5f9;}
.sidebar-link { padding:10px; cursor:pointer; }
.sidebar-link.active { background:#334155; color:white;}
.page { display:none;}
.page.active { display:block;}
.custom-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);}
</style>
</head>

<body>
<div class="flex">
<aside class="w-60 bg-slate-900 text-white p-4">
<h2 class="text-lg font-bold mb-4">LabManager</h2>
<div class="sidebar-link active" onclick="navigate('dashboard')">Dashboard</div>
<div class="sidebar-link" onclick="navigate('barang')">Barang</div>
<div class="sidebar-link" onclick="navigate('peminjaman')">Peminjaman</div>
<div class="sidebar-link" onclick="navigate('riwayat')">Riwayat</div>
</aside>

<main class="flex-1 p-6">
<h1 id="page-title" class="text-xl mb-4">dashboard</h1>

<!-- DASHBOARD -->
<section id="dashboard" class="page active">
<h2>Total Barang: <span id="stat-total">0</span></h2>
</section>

<!-- BARANG -->
<section id="barang" class="page">
<button onclick="toggleModal(true)">+ Tambah</button>
<table class="w-full mt-4">
<tbody id="barangTable"></tbody>
</table>
</section>

<!-- PEMINJAMAN -->
<section id="peminjaman" class="page">
<form id="loanForm">
<input id="loanName" placeholder="Nama"><br>
<select id="loanBarang"></select><br>
<input id="loanQty" type="number"><br>
<button type="submit">Pinjam</button>
</form>
</section>

<!-- RIWAYAT -->
<section id="riwayat" class="page">
<table class="w-full">
<tbody id="riwayatTable"></tbody>
</table>
</section>

</main>
</div>

<!-- MODAL -->
<div id="modal" class="custom-modal flex items-center justify-center">
<div class="bg-white p-4">
<input id="nama" placeholder="Nama"><br>
<input id="stok" type="number" placeholder="Stok"><br>
<button onclick="saveBarang()">Simpan</button>
<button onclick="toggleModal(false)">Batal</button>
</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyD7v9RjzDP80LcrblAwe6DGNs_ujQ0NIkk",
authDomain: "lab-inventory-management-c59c8.firebaseapp.com",
projectId: "lab-inventory-management-c59c8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let barangList = [];

// NAVIGASI
window.navigate = function(page){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(page).classList.add('active');
document.getElementById('page-title').innerText = page;
}

// MODAL
function toggleModal(show){
document.getElementById('modal').style.display = show ? 'flex':'none';
}

// ==================== BARANG ====================
function saveBarang(){
let nama = document.getElementById('nama').value;
let stok = parseInt(document.getElementById('stok').value);

db.collection("barang").add({
nama, stok
});

toggleModal(false);
}

function renderBarang(){
let html="";
barangList.forEach(b=>{
html+=`<tr>
<td>${b.nama}</td>
<td>${b.stok}</td>
</tr>`;
});
document.getElementById('barangTable').innerHTML=html;

// isi dropdown
let opt="";
barangList.forEach(b=>{
opt+=`<option value="${b.id}">${b.nama}</option>`;
});
document.getElementById('loanBarang').innerHTML=opt;
}

// realtime barang
db.collection("barang").onSnapshot(snap=>{
barangList=[];
snap.forEach(doc=>{
barangList.push({id:doc.id,...doc.data()});
});
renderBarang();
document.getElementById('stat-total').innerText=barangList.length;
});

// ==================== PEMINJAMAN ====================
document.getElementById('loanForm').addEventListener('submit',e=>{
e.preventDefault();

let id = document.getElementById('loanBarang').value;
let qty = parseInt(document.getElementById('loanQty').value);
let nama = document.getElementById('loanName').value;

let barang = barangList.find(b=>b.id==id);

if(barang.stok < qty){
alert("stok tidak cukup");
return;
}

// kurangi stok
db.collection("barang").doc(id).update({
stok: barang.stok - qty
});

// simpan loan
db.collection("loan").add({
nama,
barang: barang.nama,
qty,
status:"dipinjam",
time:new Date()
});
});

// ==================== RIWAYAT ====================
function renderRiwayat(data){
let html="";
data.forEach(l=>{
html+=`<tr>
<td>${l.nama}</td>
<td>${l.barang}</td>
<td>${l.qty}</td>
<td>${l.status}</td>
<td>
${l.status=="dipinjam" ? `<button onclick="kembali('${l.id}',${l.qty},'${l.barang}')">Kembali</button>`:''}
</td>
</tr>`;
});
document.getElementById('riwayatTable').innerHTML=html;
}

db.collection("loan").onSnapshot(snap=>{
let data=[];
snap.forEach(doc=>{
data.push({id:doc.id,...doc.data()});
});
renderRiwayat(data);
});

// pengembalian
function kembali(id, qty, namaBarang){
let barang = barangList.find(b=>b.nama==namaBarang);

// tambah stok
db.collection("barang").doc(barang.id).update({
stok: barang.stok + qty
});

// update status
db.collection("loan").doc(id).update({
status:"kembali"
});
}
</script>

</body>
</html>
