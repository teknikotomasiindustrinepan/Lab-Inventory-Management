<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Inventory System</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; background:#f1f5f9;}
.sidebar-link { padding:10px; cursor:pointer; }
.sidebar-link.active { background:#334155; color:white;}
.page { display:none;}
.page.active { display:block;}
.custom-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);}
</style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="flex">

<aside class="w-60 bg-slate-900 text-white p-4 flex flex-col justify-between h-screen">

  <div>
    <h2 class="text-lg font-bold mb-4">LabManager</h2>

    <div id="userInfo" class="mb-4 text-sm"></div>

    <div id="menu-dashboard" class="sidebar-link active" onclick="navigate('dashboard')">Dashboard</div>
    <div id="menu-barang" class="sidebar-link" onclick="navigate('barang')">Barang</div>
    <div id="menu-peminjaman" class="sidebar-link" onclick="navigate('peminjaman')">Peminjaman</div>
    <div id="menu-riwayat" class="sidebar-link" onclick="navigate('riwayat')">Riwayat</div>
    <div id="menu-barangRusak" class="sidebar-link" onclick="navigate('barangRusak')">Barang Rusak</div>
  </div>

  <button onclick="logout()" class="bg-red-500 p-2 rounded">Logout</button>

</aside>


<!-- ================= MAIN ================= -->
<main class="flex-1 p-6">

<h1 id="page-title" class="text-xl mb-4">Dashboard</h1>

<!-- ===== DASHBOARD ===== -->
<section id="dashboard" class="page active">
  <div class="grid grid-cols-3 gap-4">
    <div class="bg-white p-4 rounded shadow text-center">
      <h3>Total Barang</h3>
      <p id="stat-total">0</p>
    </div>
  </div>
</section>

<!-- ===== BARANG ===== -->
<section id="barang" class="page">
  <button onclick="toggleModal(true)" class="bg-blue-500 text-white px-3 py-1 rounded">+ Tambah</button>

  <table class="w-full mt-4 border">
    <thead><tr><th>Kode</th><th>Nama</th><th>Stok</th></tr></thead>
    <tbody id="barangTable"></tbody>
  </table>
</section>

<!-- ===== PEMINJAMAN ===== -->
<section id="peminjaman" class="page">
  <form id="loanForm" class="space-y-2">
    <input id="loanName" placeholder="Nama" class="border p-2 w-full">
    <select id="loanBarang" class="border p-2 w-full"></select>
    <input id="loanQty" type="number" placeholder="Jumlah" class="border p-2 w-full">
    <button class="bg-blue-600 text-white p-2 w-full">Pinjam</button>
  </form>
</section>

<!-- ===== RIWAYAT ===== -->
<section id="riwayat" class="page">
  <table class="w-full border">
    <thead><tr><th>Nama</th><th>Barang</th><th>Qty</th></tr></thead>
    <tbody id="riwayatTable"></tbody>
  </table>
</section>

<!-- ===== LOGIN ===== -->
<div id="loginPage" class="fixed inset-0 flex items-center justify-center bg-black/50">
  <div class="bg-white p-6 rounded w-80">
    <h2 class="mb-4 font-bold">Login</h2>
    <input id="email" placeholder="Email" class="border p-2 w-full mb-2">
    <input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-2">
    <button onclick="login()" class="bg-blue-600 text-white p-2 w-full">Login</button>
  </div>
</div>

<!-- ===== MODAL ===== -->
<div id="modal" class="custom-modal flex items-center justify-center">
  <div class="bg-white p-4">
    <input id="nama" placeholder="Nama Barang"><br>
    <input id="stok" type="number" placeholder="Stok"><br>
    <button onclick="saveBarang()">Simpan</button>
    <button onclick="toggleModal(false)">Batal</button>
  </div>
</div>

</main>
</div>


<!-- ================= FIREBASE ================= -->
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>


<script>

/*************************************************
 * 1. CONFIG
 *************************************************/
const firebaseConfig = {
  apiKey: "AIzaSyD7v9RjzDP80LcrblAwe6DGNs_ujQ0NIkk",
  authDomain: "lab-inventory-management-c59c8.firebaseapp.com",
  projectId: "lab-inventory-management-c59c8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();


/*************************************************
 * 2. GLOBAL STATE
 *************************************************/
let barangList = [];
let currentUser = null;
let currentRole = null;
let editId = null;


/*************************************************
 * 3. AUTH (LOGIN & SESSION)
 *************************************************/
function login(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if(!email || !password){
    alert("Email & password wajib diisi");
    return;
  }

  auth.signInWithEmailAndPassword(email, password)
    .catch(err => alert(err.message));
}

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user;

    // Tentukan role
    currentRole = (user.email === "admin@gmail.com") ? "admin" : "user";

    document.getElementById('loginPage').style.display="none";
    document.getElementById("userInfo").innerText =
      `${user.email} (${currentRole})`;

    applyRoleUI();
    initApp();

  }else{
    document.getElementById('loginPage').style.display="flex";
  }
});

function logout(){
  auth.signOut();
}


/*************************************************
 * 4. NAVIGATION (Pindah Halaman)
 *************************************************/
const pageTitles = {
  dashboard: "Dashboard",
  barang: "Data Barang",
  peminjaman: "Peminjaman",
  riwayat: "Riwayat",
  barangRusak: "Barang Rusak"
};

function navigate(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  document.getElementById('page-title').innerText = pageTitles[page];

  document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('active'));
  document.getElementById("menu-" + page).classList.add('active');
}


/*************************************************
 * 5. ROLE MANAGEMENT
 *************************************************/
function isAdmin(){
  return currentRole === "admin";
}

function applyRoleUI(){
  if(!isAdmin()){
    document.getElementById("menu-dashboard").style.display = "none";
    document.getElementById("menu-barang").style.display = "none";
    document.getElementById("menu-barangRusak").style.display = "none";

    navigate("peminjaman");
  }
}


/*************************************************
 * 6. BARANG (CRUD)
 *************************************************/
function renderBarang(){
  let html = "";

  barangList.forEach(b=>{
    html += `
      <tr>
        <td>${b.kode}</td>
        <td>${b.nama}</td>
        <td>${b.tempat}</td>
        <td>${b.stok}</td>
      </tr>
    `;
  });

  document.getElementById('barangTable').innerHTML = html;
}

async function saveBarang(){
  if(!isAdmin()) return alert("Hanya admin");

  const nama = document.getElementById('nama').value;
  const tempat = document.getElementById('tempat').value;
  const stok = parseInt(document.getElementById('stok').value);

  if(!nama || !tempat || isNaN(stok)){
    alert("Input tidak valid");
    return;
  }

  await db.collection("barang").add({
    nama, tempat, stok,
    kode: generateKodeBarang()
  });

  toggleModal(false);
}


/*************************************************
 * 7. PEMINJAMAN
 *************************************************/
function initLoanForm(){
  const form = document.getElementById('loanForm');

  form.addEventListener('submit', async e=>{
    e.preventDefault();

    const barangId = document.getElementById('loanBarang').value;
    const qty = parseInt(document.getElementById('loanQty').value);

    await db.runTransaction(async t=>{
      const ref = db.collection("barang").doc(barangId);
      const doc = await t.get(ref);

      if(doc.data().stok < qty){
        throw "Stok tidak cukup";
      }

      t.update(ref, { stok: doc.data().stok - qty });

      t.set(db.collection("loan").doc(), {
        barangId,
        qty,
        status: "dipinjam",
        time: new Date()
      });
    });

    alert("Berhasil pinjam");
  });
}


/*************************************************
 * 8. RIWAYAT
 *************************************************/
function renderRiwayat(data){
  let html = "";

  data.forEach(l=>{
    html += `
      <tr>
        <td>${l.nama}</td>
        <td>${l.barang}</td>
        <td>${l.qty}</td>
        <td>${l.status}</td>
      </tr>
    `;
  });

  document.getElementById('riwayatTable').innerHTML = html;
}


/*************************************************
 * 9. DASHBOARD
 *************************************************/
function renderDashboard(){
  document.getElementById('stat-total').innerText = barangList.length;
}


/*************************************************
 * 10. INIT APP
 *************************************************/
function initApp(){

  // realtime barang
  db.collection("barang").onSnapshot(snap=>{
    barangList = [];
    snap.forEach(doc=>{
      barangList.push({id:doc.id,...doc.data()});
    });

    renderBarang();
    renderDashboard();
  });

  // realtime loan
  db.collection("loan").onSnapshot(snap=>{
    let data = [];
    snap.forEach(doc=>{
      data.push(doc.data());
    });

    renderRiwayat(data);
  });
}


/*************************************************
 * 11. UTILITIES
 *************************************************/
function generateKodeBarang(){
  return Math.random().toString(36).substring(2,8).toUpperCase();
}

function toggleModal(show){
  document.getElementById('modal').style.display = show ? "flex" : "none";
}
</script>

</body>
</html>
